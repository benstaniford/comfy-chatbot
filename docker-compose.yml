services:
  comfy-chatbot:
    image: nerwander/comfy-chatbot:latest
    build:
      context: .
      args:
        # Set on the host (e.g. via scripts/docker-build) so the running
        # container can log which git build it was created from.
        BUILD_VERSION: ${BUILD_VERSION:-unknown}
    container_name: comfy-chatbot
    ports:
      - "5000:5000"
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - APP_USERNAME=user
      - APP_PASSWORD=password
      - SECRET_KEY=your-super-secret-key-change-this-in-production

      # ComfyUI server — set host:port of your running ComfyUI instance
      - COMFY_SERVER=192.168.1.135:8000
      # "unix" or "windows" (controls LoRA path separator sent to the server)
      - COMFY_SERVER_OS=unix
      # Workflow template name (without .json) inside COMFY_WORKFLOW_DIR
      - COMFY_WORKFLOW=z_image_turbo_api
      # Default face-detailer workflow (without .json) inside the facedetailer/
      # subdir of COMFY_WORKFLOW_DIR, used by /face-detail. Leave blank to fall
      # back to the first workflow found there.
      - COMFY_FACEDETAILER_WORKFLOW=

      # Path inside the container where workflow templates live
      - COMFY_WORKFLOW_DIR=/app/workflows
      # Path inside the container to loras.json
      - COMFY_LORAS_FILE=/app/workflows/loras.json
      # Directory where generated images are saved inside the container
      - COMFY_OUTPUT_DIR=/app/output

      # Grok (x.ai) API — required for the /sequence command, which expands a
      # master prompt into a sequence of prompts. Leave blank to disable it.
      - XAI_API_KEY=${XAI_API_KEY:-}
      # Optional: override the Grok model used for /sequence
      - GROK_MODEL=grok-4-1-fast-non-reasoning

      # Archive (/archive-* commands) — copies images into a password-encrypted
      # volume, then deletes the originals. Requires the archive-agent .deb
      # installed and running on the host (it does the privileged zuluCrypt-cli
      # mount). Leave ARCHIVE_VOLUME/ARCHIVE_PASSWORD blank to disable archiving.
      #
      # Host path the agent opens with zuluCrypt-cli (LUKS/VeraCrypt auto-detected):
      - ARCHIVE_VOLUME=${ARCHIVE_VOLUME:-}
      # Passphrase for the encrypted volume — sent to the agent per request; the
      # agent never stores it.
      - ARCHIVE_PASSWORD=${ARCHIVE_PASSWORD:-}
      # Unix socket the host agent listens on (bind-mounted below).
      - ARCHIVE_AGENT_SOCKET=/run/archive-agent.sock
      # Where the host mount appears inside the container (bind-mounted below).
      - ARCHIVE_MOUNT_DIR=/app/archive

      # Live-output encryption (opt-in). When OUTPUT_VOLUME is set, the container
      # entrypoint asks the same host archive-agent to create-if-missing + mount
      # a LUKS volume at COMFY_OUTPUT_DIR on start and unmount it on stop, so
      # generated images are encrypted at rest whenever the container is stopped.
      # To enable: set OUTPUT_VOLUME + OUTPUT_PASSWORD below AND switch the
      # /app/output volume mount to the encrypted rshared bind (see volumes:).
      # Leave OUTPUT_VOLUME blank to keep plain (unencrypted) output.
      #
      # Host path the agent creates/opens for live output (LUKS, auto-created on
      # first deploy if absent):
      - OUTPUT_VOLUME=${OUTPUT_VOLUME:-}
      # Passphrase for the output volume — sent to the agent per request, never
      # stored. Falls back to SECRET_KEY if left blank, so you can declare a
      # single secret for the deployment.
      - OUTPUT_PASSWORD=${OUTPUT_PASSWORD:-}
      # Size of the volume created on first deploy (zuluCrypt-cli units, e.g. 20G).
      - OUTPUT_SIZE=${OUTPUT_SIZE:-20G}

    volumes:
      # Mount your existing dot-files comfyui directory so workflow templates
      # and loras.json are available without being baked into the image.
      - ~/dot-files/comfyui:/app/workflows:ro
      # Persist generated images across container restarts.
      #
      # DEFAULT (unencrypted): a plain host directory. Images are readable on the
      # host at all times.
      - ~/Pictures/ComfyUI:/app/output
      #
      # ENCRYPTED (opt-in): comment out the line above and uncomment the bind
      # below to store live output in the agent's encrypted volume instead. The
      # agent mounts the decrypted volume at its OUTPUT_MOUNT_DIR (default
      # /var/lib/archive-agent/output, set up as a shared mount); rshared
      # propagation makes it visible here. The source MUST match the agent's
      # OUTPUT_MOUNT_DIR in /etc/archive-agent.conf. Requires OUTPUT_VOLUME +
      # OUTPUT_PASSWORD above.
      # - type: bind
      #   source: /var/lib/archive-agent/output
      #   target: /app/output
      #   bind:
      #     propagation: rshared
      # Archive agent socket — lets the app ask the host agent to mount/unmount.
      - /run/archive-agent.sock:/run/archive-agent.sock
      # Archive mount point. The host agent mounts the encrypted volume at its
      # MOUNT_DIR (default /var/lib/archive-agent/mnt, which the .deb sets up as a
      # shared mount); rshared propagation makes that mount visible in here. This
      # source MUST match the agent's MOUNT_DIR in /etc/archive-agent.conf — if it
      # doesn't, images are copied to plain disk here and the encrypted volume
      # never receives them.
      - type: bind
        source: /var/lib/archive-agent/mnt
        target: /app/archive
        bind:
          propagation: rshared

    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
