services:
  comfy-chatbot:
    image: nerwander/comfy-chatbot:latest
    build:
      context: .
      args:
        # Set on the host (e.g. via scripts/docker-build) so the running
        # container can log which git build it was created from.
        BUILD_VERSION: ${BUILD_VERSION:-unknown}
    container_name: comfy-chatbot
    ports:
      - "5000:5000"
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - APP_USERNAME=user
      - APP_PASSWORD=password
      - SECRET_KEY=your-super-secret-key-change-this-in-production

      # ComfyUI server — set host:port of your running ComfyUI instance
      - COMFY_SERVER=192.168.1.135:8000
      # "unix" or "windows" (controls LoRA path separator sent to the server)
      - COMFY_SERVER_OS=unix
      # Workflow template name (without .json) inside COMFY_WORKFLOW_DIR
      - COMFY_WORKFLOW=z_image_turbo_api
      # Path inside the container where workflow templates live
      - COMFY_WORKFLOW_DIR=/app/workflows
      # Path inside the container to loras.json
      - COMFY_LORAS_FILE=/app/workflows/loras.json
      # Directory where generated images are saved inside the container
      - COMFY_OUTPUT_DIR=/app/output

    volumes:
      # Mount your existing dot-files comfyui directory so workflow templates
      # and loras.json are available without being baked into the image.
      - ~/dot-files/comfyui:/app/workflows:ro
      # Persist generated images across container restarts.
      - ~/Pictures/ComfyUI:/app/output

    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
