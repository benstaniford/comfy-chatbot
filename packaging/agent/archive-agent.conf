# Configuration for archive-agent.
# After editing: sudo systemctl restart archive-agent

# Unix socket the agent listens on. Bind-mount this same path into the
# comfy-chatbot container and point ARCHIVE_AGENT_SOCKET at it.
SOCKET_PATH=/run/archive-agent.sock

# Socket permissions (octal). 0666 lets the unprivileged container user connect.
# Tighten with a shared group if you prefer (e.g. chgrp the socket post-start).
SOCKET_MODE=0666

# Directory the decrypted volume is bind-mounted at. The agent sets this up as a
# shared mount so it propagates into the container's rshared bind mount. This
# must match the host `source:` of the container's /app/archive bind mount.
MOUNT_DIR=/var/lib/archive-agent/mnt

# zuluCrypt-cli's -m value: a path component appended to /run/media/private/root.
# The agent mounts the volume there and bind-mounts it onto MOUNT_DIR. Rarely
# needs changing.
MOUNT_NAME=comfy-archive

# --- Live-output volume (optional) -------------------------------------------
# Separate, persistently mounted volume for the container's live image output
# (the {"target":"output"} mount). The agent sets OUTPUT_MOUNT_DIR up as its own
# shared mount; it must match the host `source:` of the container's encrypted
# /app/output bind in docker-compose.yml.
OUTPUT_MOUNT_DIR=/var/lib/archive-agent/output

# zuluCrypt-cli -m value for the output volume (appended to /run/media/private/root).
OUTPUT_MOUNT_NAME=comfy-output

# --- Host-facing archive mount -----------------------------------------------
# Where the container exposes the decrypted archive for external host tools (e.g.
# samba), via the {"target":"host"} / host-mount action. This is a bind of the
# single archive mount — never a second decrypt — so the container stays the sole
# owner of the volume. It is server-owned config (NOT taken from the API request)
# so a host-mount call can't bind decrypted data to an arbitrary path.
HOST_MOUNT_DIR=/run/media/private/ben/secure

# The host user given ownership of the host mount root (so it, and samba running
# as it, can manage files directly). The mount root is also chmod 0777.
HOST_MOUNT_USER=ben
